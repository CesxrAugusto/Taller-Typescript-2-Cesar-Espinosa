<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="Images/IMDB_Logo_2016.svg" type="image/svg+xml">
    <title>IMBD - TV Series</title>
</head>
    
<body>
    <nav class="navbar" style="background-color: #000;">
        <div class="container-fluid">
            <div class="navbar-brand d-flex align-items-center gap-2">
                <img src="Images\IMDB_Logo_2016.svg" alt="IMBD Logo" style="height: 40px; width: auto;"></img>
                <span class="text-white fw-bold">TV Series</span>     
            </div>
        </div>
    </nav>

    <br>

    <div class = "container-fluid">
        <div class="row">
            <div class = "col-1"></div>
            <div class = "col-7">
                <div class="row">
                    <table class="table table-striped">
                            <thead class="thead-dark">
                                <tr>
                                    <th scope="col" class="fw-bold">#</th>
                                    <th scope="col" class="fw-bold">Name</th>
                                    <th scope="col" class="fw-bold">Channel</th>
                                    <th scope="col" class="fw-bold">Seasons</th>
                                </tr>
                            </thead>

                            <tbody id="tabla-series"></tbody>
                    </table>
                </div>
                <div class="row" id="promedio-seasons"></div>
            </div>

            <div class="col-4">
                <div class="card" style="width: 18rem;">
                    <img class="card-img-top" src="Images\Card-Default.png" id="imagen" alt="Card image cap">
                    <div class="card-body">
                        <h5 class="card-title" id="titulo">Título</h5>
                        <p class="card-text" id="descripcion">Descripción</p>
                        <a href="#" class="btn btn-primary" id="link">Ver</a>
                    </div> 

                </div>
            </div>
        </div>
    </div>

<script src="main.js"></script>
</body>
</html>
